<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👨‍🏫 Атом знаний — Тьютор</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ============================================================
           ГЛОБАЛЬНЫЕ СТИЛИ
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: radial-gradient(ellipse at center, #0B1E3A, #050f1a);
            min-height: 100vh;
            padding: 20px;
        }

        /* ----- АНИМАЦИИ ----- */
        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.2;
                transform: scale(0.8);
            }
            50% {
                opacity: 1;
                transform: scale(1.3);
            }
        }

        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 50px rgba(0, 210, 255, 0.4);
            }
        }

        @keyframes slideIn {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-6px);
            }
        }

        @keyframes statusPulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.3);
                opacity: 0.7;
            }
        }

        /* ============================================================
           ЗВЁЗДЫ (фон)
           ============================================================ */
        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }

        /* ============================================================
           ОСНОВНОЙ КОНТЕЙНЕР
           ============================================================ */
        .tutor-container {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(11, 30, 58, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 24px 32px 32px;
            border: 1px solid rgba(0, 210, 255, 0.08);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.5s ease-out;
        }

        /* ============================================================
           НАВИГАЦИОННАЯ ПАНЕЛЬ
           ============================================================ */
        .nav-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(0, 210, 255, 0.06);
            margin-bottom: 20px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 0.04em;
            text-shadow: 0 0 16px #00D2FF88;
            margin-right: 12px;
        }

        .nav-logo i {
            font-size: 26px;
            color: #00D2FF;
            filter: drop-shadow(0 0 12px #00D2FF);
        }

        .nav-logo span {
            background: linear-gradient(135deg, #e0f0ff, #b0eaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid rgba(0, 210, 255, 0.08);
            background: rgba(0, 0, 0, 0.2);
            color: #b0d4f0;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-btn:hover {
            background: rgba(0, 210, 255, 0.06);
            border-color: rgba(0, 210, 255, 0.2);
            transform: translateY(-2px);
        }

        .nav-btn i {
            font-size: 16px;
            color: #00D2FF99;
        }

        .nav-btn.active {
            background: rgba(0, 210, 255, 0.12);
            border-color: #00D2FF55;
            color: #00D2FF;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.08);
        }

        .nav-btn.active i {
            color: #00D2FF;
        }

        .nav-btn.gold {
            border-color: #FFD70033;
            color: #FFD700;
        }

        .nav-btn.gold i {
            color: #FFD70099;
        }

        .nav-btn.gold:hover {
            background: rgba(255, 215, 0, 0.06);
            border-color: #FFD70055;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nav-right .coins-small {
            background: rgba(255, 215, 0, 0.1);
            padding: 6px 14px 6px 12px;
            border-radius: 40px;
            border: 1px solid #FFD70033;
            color: #FFD700;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-right .level-small {
            background: rgba(0, 210, 255, 0.08);
            padding: 6px 14px 6px 12px;
            border-radius: 40px;
            border: 1px solid #00D2FF33;
            color: #00D2FF;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ============================================================
           ЗАГОЛОВОК
           ============================================================ */
        .header-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .header-title h1 {
            color: #FFD700;
            font-size: 28px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title h1 i {
            color: #00D2FF;
        }

        .header-title .stats-badge {
            color: #b0d4f0;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid rgba(0, 210, 255, 0.06);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title .stats-badge span {
            color: #fff;
            font-weight: 600;
        }

        /* ============================================================
           СЕТКА КАРТОЧЕК УЧЕНИКОВ
           ============================================================ */
        .students-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            margin-top: 4px;
        }

        /* ----- КАРТОЧКА УЧЕНИКА ----- */
        .student-card {
            background: rgba(20, 45, 72, 0.35);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 20px 18px 18px;
            border: 1px solid rgba(0, 210, 255, 0.06);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .student-card:hover {
            border-color: rgba(0, 210, 255, 0.2);
            transform: translateY(-4px);
            box-shadow: 0 12px 50px rgba(0, 0, 0, 0.4);
        }

        .student-card .card-top {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 10px;
        }

        .student-card .avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #fff;
            border: 2px solid rgba(0, 210, 255, 0.2);
            flex-shrink: 0;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.1);
        }

        .student-card .avatar .status-dot {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid rgba(11, 30, 58, 0.8);
            animation: statusPulse 2s ease-in-out infinite;
        }

        .student-card .avatar .status-dot.green {
            background: #42f581;
            box-shadow: 0 0 16px rgba(66, 245, 129, 0.5);
        }

        .student-card .avatar .status-dot.yellow {
            background: #f5c542;
            box-shadow: 0 0 16px rgba(245, 197, 66, 0.5);
            animation-duration: 1.5s;
        }

        .student-card .avatar .status-dot.red {
            background: #f54242;
            box-shadow: 0 0 20px rgba(245, 66, 66, 0.6);
            animation-duration: 0.8s;
        }

        .student-card .student-name {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            flex: 1;
        }

        .student-card .student-name .class-badge {
            font-size: 11px;
            font-weight: 400;
            color: #8bb8da;
            background: rgba(0, 0, 0, 0.2);
            padding: 2px 10px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 2px;
        }

        .student-card .card-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 4px;
        }

        .student-card .info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #b0d4f0;
            font-size: 13px;
        }

        .student-card .info-row .label {
            color: #8bb8da;
            font-size: 12px;
        }

        .student-card .info-row .value {
            color: #fff;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .student-card .info-row .value .location {
            color: #00D2FF;
            font-size: 12px;
        }

        .student-card .progress-block {
            margin-top: 8px;
        }

        .student-card .progress-block .bar {
            width: 100%;
            height: 6px;
            background: #1a3750;
            border-radius: 20px;
            overflow: hidden;
        }

        .student-card .progress-block .bar .fill {
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(90deg, #00D2FF, #7ae0ff);
            box-shadow: 0 0 16px rgba(0, 210, 255, 0.3);
            transition: width 0.8s ease;
        }

        .student-card .progress-block .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #8bb8da;
            margin-top: 4px;
        }

        .student-card .progress-block .progress-label .percent {
            color: #00D2FF;
            font-weight: 600;
        }

        /* ----- РАЗНЫЕ АВАТАРЫ ----- */
        .avatar-1 {
            background: radial-gradient(circle at 30% 30%, #4A90D9, #1a3a6a);
        }

        .avatar-2 {
            background: radial-gradient(circle at 30% 30%, #2ECC71, #1a6a3a);
        }

        .avatar-3 {
            background: radial-gradient(circle at 30% 30%, #9B59B6, #4a1a6a);
        }

        .avatar-4 {
            background: radial-gradient(circle at 30% 30%, #F39C12, #8a5a0a);
        }

        .avatar-5 {
            background: radial-gradient(circle at 30% 30%, #E74C3C, #6a1a1a);
        }

        .avatar-6 {
            background: radial-gradient(circle at 30% 30%, #1ABC9C, #0a5a4a);
        }

        .avatar-7 {
            background: radial-gradient(circle at 30% 30%, #3498DB, #1a3a6a);
        }

        .avatar-8 {
            background: radial-gradient(circle at 30% 30%, #E67E22, #6a3a0a);
        }

        /* ----- СТАТУС КАРТОЧКИ (красный маркер) ----- */
        .student-card.alert {
            border-color: #f5424255;
            box-shadow: 0 0 40px rgba(245, 66, 66, 0.1);
        }

        .student-card.alert .avatar {
            border-color: #f5424266;
        }

        /* ----- КНОПКА "КАРТА УЧЕНИКА" ----- */
        .student-map-btn {
            margin-top: 12px;
            padding: 6px 16px;
            border-radius: 40px;
            border: 1px solid rgba(0, 210, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            color: #b0d4f0;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            width: 100%;
            justify-content: center;
        }

        .student-map-btn:hover {
            background: rgba(0, 210, 255, 0.06);
            border-color: #00D2FF44;
            transform: scale(1.02);
        }

        .student-map-btn i {
            color: #00D2FF;
            font-size: 14px;
        }

        /* ============================================================
           АДАПТИВНОСТЬ
           ============================================================ */
        @media (max-width: 768px) {
            .tutor-container {
                padding: 16px;
                border-radius: 32px;
            }

            .nav-bar {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }

            .nav-left {
                justify-content: center;
                flex-wrap: wrap;
            }

            .nav-right {
                justify-content: center;
            }

            .nav-btn {
                padding: 6px 14px;
                font-size: 12px;
            }

            .nav-btn i {
                font-size: 14px;
            }

            .nav-logo {
                font-size: 15px;
            }

            .nav-logo i {
                font-size: 20px;
            }

            .header-title {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .header-title h1 {
                font-size: 22px;
                justify-content: center;
            }

            .header-title .stats-badge {
                font-size: 12px;
                padding: 6px 14px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .students-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 14px;
            }

            .student-card {
                padding: 16px 14px 14px;
            }

            .student-card .avatar {
                width: 46px;
                height: 46px;
                font-size: 22px;
            }

            .student-card .student-name {
                font-size: 16px;
            }

            .nav-right .coins-small,
            .nav-right .level-small {
                font-size: 11px;
                padding: 4px 10px 4px 8px;
            }
        }

        @media (max-width: 480px) {
            .tutor-container {
                padding: 12px;
                border-radius: 24px;
            }

            .nav-left {
                gap: 4px;
            }

            .nav-btn {
                padding: 4px 10px;
                font-size: 10px;
                gap: 4px;
            }

            .nav-btn i {
                font-size: 12px;
            }

            .nav-logo {
                font-size: 13px;
                margin-right: 6px;
            }

            .nav-logo i {
                font-size: 16px;
            }

            .header-title h1 {
                font-size: 18px;
            }

            .students-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .student-card .avatar {
                width: 38px;
                height: 38px;
                font-size: 18px;
            }

            .student-card .student-name {
                font-size: 14px;
            }

            .student-card .info-row {
                font-size: 11px;
            }

            .student-map-btn {
                font-size: 10px;
                padding: 4px 12px;
            }

            .nav-right .coins-small,
            .nav-right .level-small {
                font-size: 10px;
                padding: 3px 8px 3px 6px;
            }
        }

        /* ============================================================
           УТИЛИТЫ
           ============================================================ */
        .hidden {
            display: none !important;
        }

        .text-center {
            text-align: center;
        }

        .text-gold {
            color: #FFD700;
        }

        .text-cyan {
            color: #00D2FF;
        }

        .text-white {
            color: #fff;
        }

        .mt-8 {
            margin-top: 8px;
        }

        .flex {
            display: flex;
        }

        .gap-8 {
            gap: 8px;
        }
    </style>
</head>
<body>

<!-- ЗВЁЗДЫ (фон) -->
<div class="stars-bg" id="starsBg"></div>

<!-- ============================================================
КАБИНЕТ ТЬЮТОРА
============================================================ -->
<div class="tutor-container">

    <!-- ===== НАВИГАЦИОННАЯ ПАНЕЛЬ ===== -->
    <div class="nav-bar">
        <div class="nav-left">
            <div class="nav-logo">
                <i class="fas fa-atom"></i>
                <span>Атом знаний</span>
            </div>
            <button class="nav-btn active" onclick="goToDashboard()">
                <i class="fas fa-chalkboard-teacher"></i> Доска
            </button>
            <button class="nav-btn" onclick="goToLibrary()">
                <i class="fas fa-book"></i> Библиотека
            </button>
            <button class="nav-btn gold" onclick="goToCheatsheets()">
                <i class="fas fa-lightbulb"></i> Шпаргалки
            </button>
            <button class="nav-btn" onclick="window.location.href='профильучителя.html'">
                <i class="fas fa-user-cog"></i> Профиль
            </button>
        </div>
        <div class="nav-right">
            <span class="coins-small"><i class="fas fa-coins"></i> 256</span>
            <span class="level-small"><i class="fas fa-star"></i> Lv.12</span>
        </div>
    </div>

    <!-- ===== ЗАГОЛОВОК ===== -->
    <div class="header-title">
        <h1>
            <i class="fas fa-users"></i> Единый класс
        </h1>
        <div class="stats-badge">
            <span><i class="fas fa-user-graduate" style="color:#00D2FF;"></i> Учеников: <span id="studentCount">8</span></span>
            <span><i class="fas fa-circle" style="color:#42f581;"></i> Онлайн: <span id="onlineCount">5</span></span>
            <span><i class="fas fa-exclamation-triangle" style="color:#f54242;"></i> Тревога: <span
                    id="alertCount">2</span></span>
        </div>
    </div>

    <!-- ===== СЕТКА УЧЕНИКОВ ===== -->
    <div class="students-grid" id="studentsGrid">
        <!-- Карточки генерируются через JS -->
    </div>

</div>

<!-- ============================================================
МОДАЛЬНОЕ ОКНО КАРТЫ УЧЕНИКА
============================================================ -->
<div class="modal-overlay hidden" id="studentMapModal"
     style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.75);backdrop-filter:blur(10px);z-index:100;display:flex;align-items:center;justify-content:center;">
    <div class="modal-content"
         style="background:rgba(11,30,58,0.95);backdrop-filter:blur(16px);border-radius:40px;padding:32px 38px;max-width:480px;width:92%;border:1px solid rgba(0,210,255,0.1);box-shadow:0 40px 100px rgba(0,0,0,0.6);animation:slideIn 0.3s ease-out;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h2 style="color:#FFD700;font-size:22px;display:flex;align-items:center;gap:10px;">
                <i class="fas fa-map-marked-alt"></i> <span id="modalStudentName">Ученик</span>
            </h2>
            <button onclick="closeStudentMap()"
                    style="background:none;border:none;color:#b0d4f0;font-size:28px;cursor:pointer;">✕
            </button>
        </div>
        <div style="text-align:center;padding:20px 0;">
            <div style="font-size:64px;margin-bottom:12px;" id="modalStudentAvatar">👦</div>
            <div style="color:#fff;font-size:20px;font-weight:600;" id="modalStudentName2">Миша</div>
            <div style="color:#b0d4f0;margin:8px 0 16px;">
                <i class="fas fa-map-pin" style="color:#00D2FF;"></i> Находится на: <span id="modalStudentLocation"
                                                                                          style="color:#00D2FF;font-weight:500;">Остров Математики</span>
            </div>
            <div style="background:rgba(0,0,0,0.2);border-radius:16px;padding:16px;margin:12px 0;border:1px solid rgba(0,210,255,0.06);">
                <div style="color:#b0d4f0;font-size:14px;">Прогресс</div>
                <div style="color:#fff;font-size:24px;font-weight:700;" id="modalStudentProgress">78%</div>
                <div style="width:100%;height:6px;background:#1a3750;border-radius:20px;margin-top:6px;overflow:hidden;">
                    <div id="modalStudentProgressBar"
                         style="height:100%;width:78%;background:linear-gradient(90deg,#00D2FF,#7ae0ff);border-radius:20px;transition:width 0.5s;"></div>
                </div>
            </div>
            <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px;">
                <button onclick="sendMessage()"
                        style="padding:10px 24px;border-radius:40px;border:none;background:#00D2FF;color:#0B1E3A;font-weight:600;cursor:pointer;transition:0.3s;">
                    <i class="fas fa-comment"></i> Написать
                </button>
                <button onclick="closeStudentMap()"
                        style="padding:10px 24px;border-radius:40px;border:1px solid rgba(0,210,255,0.1);background:rgba(0,0,0,0.2);color:#b0d4f0;cursor:pointer;transition:0.3s;">
                    Закрыть
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ============================================================
JAVASCRIPT
============================================================ -->
<script>
    // ============================================================
    // 1. ДАННЫЕ УЧЕНИКОВ
    // ============================================================
    const students = [{
        id: 1,
        name: 'Миша Р.',
        age: 10,
        class: '5А',
        avatar: '👦',
        avatarClass: 'avatar-1',
        status: 'online',
        progress: 78,
        location: 'Остров Математики',
        alert: false,
    }, {
        id: 2,
        name: 'Алина К.',
        age: 9,
        class: '5А',
        avatar: '👧',
        avatarClass: 'avatar-2',

    // ============================================================
    // 2. ОТРИСОВКА КАРТОЧЕК
    // ============================================================
    function renderStudents() {
        const container = document.getElementById('studentsGrid');
        container.innerHTML = '';

        let onlineCount = 0;
        let alertCount = 0;

        students.forEach(student => {
            if (student.status === 'online') onlineCount++;
            if (student.alert) alertCount++;

            const statusDot = {
                online: 'green',
                away: 'yellow',
                alert: 'red',
            };

            const statusLabel = {
                online: 'В сети',
                away: 'Отошёл',
                alert: 'Тревога!',
            };

            const card = document.createElement('div');
            card.className = `student-card ${student.alert ? 'alert' : ''}`;
            card.innerHTML = `
                    <div class="card-top">
                        <div class="avatar ${student.avatarClass}">
                            ${student.avatar}
                            <span class="status-dot ${statusDot[student.status] || 'green'}"></span>
                        </div>
                        <div class="student-name">
                            ${student.name}
                            <span class="class-badge">${student.class}</span>
                        </div>
                    </div>
                    <div class="card-info">
                        <div class="info-row">
                            <span class="label">Статус</span>
                            <span class="value" style="color:${student.status === 'alert' ? '#f54242' : student.status === 'away' ? '#f5c542' : '#42f581'}">
                                ${statusLabel[student.status] || 'В сети'}
                            </span>
                        </div>
                        <div class="info-row">
                            <span class="label">📍 Местоположение</span>
                            <span class="value">
                                <span class="location">${student.location}</span>
                            </span>
                        </div>
                    </div>
                    <div class="progress-block">
                        <div class="bar">
                            <div class="fill" style="width:${student.progress}%"></div>
                        </div>
                        <div class="progress-label">
                            <span>Прогресс</span>
                            <span class="percent">${student.progress}%</span>
                        </div>
                    </div>
                    <button class="student-map-btn" onclick="openStudentMap(${student.id})">
                        <i class="fas fa-map-marked-alt"></i> Карта ученика
                    </button>
                `;
            container.appendChild(card);
        });

        document.getElementById('studentCount').textContent = students.length;
        document.getElementById('onlineCount').textContent = onlineCount;
        document.getElementById('alertCount').textContent = alertCount;
    }

    // ============================================================
    // 3. МОДАЛЬНОЕ ОКНО КАРТЫ УЧЕНИКА
    // ============================================================
    function openStudentMap(id) {
        const student = students.find(s => s.id === id);
        if (!student) return;

        document.getElementById('modalStudentName').textContent = student.name;
        document.getElementById('modalStudentName2').textContent = student.name;
        document.getElementById('modalStudentAvatar').textContent = student.avatar;
        document.getElementById('modalStudentLocation').textContent = student.location;
        document.getElementById('modalStudentProgress').textContent = student.progress + '%';
        document.getElementById('modalStudentProgressBar').style.width = student.progress + '%';

        document.getElementById('studentMapModal').classList.remove('hidden');
        document.getElementById('studentMapModal').style.display = 'flex';
    }

    function closeStudentMap() {
        document.getElementById('studentMapModal').classList.add('hidden');
        document.getElementById('studentMapModal').style.display = 'none';
    }

    function sendMessage() {
        alert('💬 Сообщение отправлено тьютору!');
    }

    // ============================================================
    // 4. ЗВЁЗДЫ
    // ============================================================
    function createStars() {
        const container = document.getElementById('starsBg');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
            container.appendChild(star);
        }
    }
