<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Космический путь — Атом знаний</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ============================================================
           ГЛОБАЛЬНЫЕ СТИЛИ И АНИМАЦИИ
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: #050f1a;
            overflow: hidden;
            height: 100vh;
            user-select: none;
        }

        /* ----- АНИМАЦИИ ----- */
        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.2;
                transform: scale(0.8);
            }
            50% {
                opacity: 1;
                transform: scale(1.3);
            }
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }
            50% {
                transform: translateY(-15px) rotate(3deg);
            }
        }

        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            }
            50% {
                transform: scale(1.2);
                box-shadow: 0 0 60px rgba(0, 210, 255, 0.8);
            }
        }

        @keyframes pulse-gold {
            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            }
            50% {
                transform: scale(1.15);
                box-shadow: 0 0 70px rgba(255, 215, 0, 0.7);
            }
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes rotate-reverse {
            from {
                transform: rotate(360deg);
            }
            to {
                transform: rotate(0deg);
            }
        }

        @keyframes slideIn {
            from {
                transform: translateY(40px) scale(0.95);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        @keyframes fireworks {
            0% {
                transform: scale(0) rotate(0deg);
                opacity: 0;
            }
            50% {
                transform: scale(2) rotate(180deg);
                opacity: 1;
            }
            100% {
                transform: scale(0) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes warpSpeed {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.5);
                opacity: 0.5;
            }
            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-5px);
            }
            75% {
                transform: translateX(5px);
            }
        }

        /* ============================================================
           ОСНОВНОЙ КОНТЕЙНЕР
           ============================================================ */
        .space-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(ellipse at center, #0B1E3A, #050f1a);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ----- ЗВЁЗДЫ ----- */
        .stars-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }

        /* ----- ТУМАННОСТИ ----- */
        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 1;
            opacity: 0.3;
        }

        /* ============================================================
           НАВИГАЦИОННАЯ ПАНЕЛЬ (СВЕРХУ)
           ============================================================ */
        .nav-bar {
            position: relative;
            z-index: 25;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            padding: 12px 28px;
            background: rgba(10, 25, 47, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 210, 255, 0.08);
            flex-shrink: 0;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 0.04em;
            text-shadow: 0 0 16px #00D2FF88;
            margin-right: 12px;
        }
        .nav-logo i {
            font-size: 26px;
            color: #00D2FF;
            filter: drop-shadow(0 0 12px #00D2FF);
        }
        .nav-logo span {
            background: linear-gradient(135deg, #e0f0ff, #b0eaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid rgba(0, 210, 255, 0.08);
            background: rgba(0, 0, 0, 0.2);
            color: #b0d4f0;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
        }
        .nav-btn:hover {
            background: rgba(0, 210, 255, 0.06);
            border-color: rgba(0, 210, 255, 0.2);
            transform: translateY(-2px);
        }
        .nav-btn i {
            font-size: 16px;
            color: #00D2FF99;
        }
        .nav-btn.active {
            background: rgba(0, 210, 255, 0.12);
            border-color: #00D2FF55;
            color: #00D2FF;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.08);
        }
        .nav-btn.active i {
            color: #00D2FF;
        }
        .nav-btn.gold {
            border-color: #FFD70033;
            color: #FFD700;
        }
        .nav-btn.gold i {
            color: #FFD70099;
        }
        .nav-btn.gold:hover {
            background: rgba(255, 215, 0, 0.06);
            border-color: #FFD70055;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-right .coins-small {
            background: rgba(255, 215, 0, 0.1);
            padding: 6px 14px 6px 12px;
            border-radius: 40px;
            border: 1px solid #FFD70033;
            color: #FFD700;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-right .level-small {
            background: rgba(0, 210, 255, 0.08);
            padding: 6px 14px 6px 12px;
            border-radius: 40px;
            border: 1px solid #00D2FF33;
            color: #00D2FF;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ============================================================
           ВЕРХНЯЯ ПАНЕЛЬ КАРТЫ
           ============================================================ */
        .top-panel {
            position: relative;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 28px;
            background: rgba(10, 25, 47, 0.3);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(0, 210, 255, 0.04);
            flex-shrink: 0;
        }

        .top-panel .planet-name-display {
            color: #b0d4f0;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
        }
        .top-panel .planet-name-display i {
            color: #00D2FF;
        }

        /* ============================================================
           ИВЕНТ-БАННЕР
           ============================================================ */
        .event-banner {
            position: relative;
            z-index: 15;
            margin: 8px 28px 0 28px;
            padding: 8px 20px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.12), rgba(255, 215, 0, 0.04));
            border: 1px solid #FFD70033;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #FFD700;
            font-weight: 500;
            flex-shrink: 0;
            backdrop-filter: blur(4px);
            font-size: 14px;
        }
        .event-banner .timer {
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 13px;
            color: #fff;
        }

        /* ============================================================
           КАРТА (ОСНОВНОЕ ПОЛЕ)
           ============================================================ */
        .map-wrapper {
            position: relative;
            flex: 1;
            overflow: hidden;
            z-index: 10;
            cursor: grab;
        }
        .map-wrapper:active {
            cursor: grabbing;
        }

        .map-inner {
            position: relative;
            width: 100%;
            height: 100%;
            padding: 30px;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* ----- ПЛАНЕТЫ ----- */
        .planet {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            box-shadow: 0 10px 60px rgba(0, 0, 0, 0.5);
        }
        .planet:hover {
            transform: scale(1.05) !important;
        }
        .planet .planet-name {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            margin-top: 4px;
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 12px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }
        .planet .planet-icon {
            font-size: 50px;
            line-height: 1;
        }
        .planet .planet-status {
            font-size: 20px;
            margin-top: -4px;
        }
        .planet.completed {
            border-color: #FFD700 !important;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.3);
        }
        .planet .rings {
            position: absolute;
            width: 140%;
            height: 30%;
            border: 2px solid rgba(0, 210, 255, 0.2);
            border-radius: 50%;
            top: 35%;
            left: -20%;
            animation: rotate 20s linear infinite;
            pointer-events: none;
        }
        .planet .rings-inner {
            width: 120%;
            height: 20%;
            border: 2px solid rgba(0, 210, 255, 0.1);
            border-radius: 50%;
            top: 40%;
            left: -10%;
            animation: rotate-reverse 15s linear infinite;
            position: absolute;
            pointer-events: none;
        }

        /* ----- ТОЧКИ МИССИЙ ----- */
        .mission-dot {
            position: absolute;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            transform: translate(-50%, -50%);
            z-index: 12;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        .mission-dot:hover {
            transform: translate(-50%, -50%) scale(1.25);
            z-index: 15;
        }
        .mission-dot.completed {
            background: #FFD700;
            color: #0B1E3A;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            border-color: #FFD700;
        }
        .mission-dot.active {
            background: #00D2FF;
            color: #0B1E3A;
            animation: pulse 1.5s ease-in-out infinite;
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.6);
            border-color: #00D2FF;
        }
        .mission-dot.locked {
            background: #1a3750;
            color: #5886a8;
            cursor: not-allowed;
            opacity: 0.5;
            border-color: transparent;
        }
        .mission-dot.bonus {
            background: #FF6B6B;
            color: white;
            animation: pulse-gold 2s ease-in-out infinite;
            box-shadow: 0 0 40px #FF6B6B66;
            border-color: #FF6B6B;
        }
        .mission-dot.secret {
            background: #9B59B6;
            color: white;
            animation: pulse 1.5s ease-in-out infinite;
            box-shadow: 0 0 40px #9B59B644;
            border-color: #9B59B6;
        }

        /* ----- ЗВЁЗДНЫЕ ДОРОЖКИ ----- */
        .star-path {
            position: absolute;
            height: 3px;
            background: linear-gradient(90deg, rgba(0, 210, 255, 0.1), rgba(0, 210, 255, 0.4), rgba(0, 210, 255, 0.1));
            transform-origin: left center;
            pointer-events: none;
            z-index: 8;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.1);
        }
        .star-path.completed {
            background: linear-gradient(90deg, rgba(255, 215, 0, 0.2), rgba(255, 215, 0, 0.6), rgba(255, 215, 0, 0.2));
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.15);
        }

        /* ----- ЛЕГЕНДА ----- */
        .legend {
            position: absolute;
            bottom: 20px;
            right: 30px;
            z-index: 30;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 10px 16px;
            border-radius: 16px;
            border: 1px solid rgba(0, 210, 255, 0.08);
            display: flex;
            gap: 14px;
            color: #b0d4f0;
            font-size: 12px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .legend-item .dot-sample {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
        }
        .legend-item .dot-sample.completed {
            background: #FFD700;
        }
        .legend-item .dot-sample.active {
            background: #00D2FF;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .legend-item .dot-sample.locked {
            background: #1a3750;
        }

        /* ----- СТРИК-БАННЕР ----- */
        .streak-banner {
            position: absolute;
            bottom: 20px;
            left: 30px;
            z-index: 30;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 107, 107, 0.15);
            color: #FF6B6B;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ----- ДРУЗЬЯ ОНЛАЙН (ОБНОВЛЁННЫЕ) ----- */
        .friends-online {
            position: absolute;
            top: 20px;
            right: 30px;
            z-index: 30;
            display: flex;
            gap: 6px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-radius: 40px;
            border: 1px solid rgba(0, 210, 255, 0.06);
            cursor: default;
        }
        .friend-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #3c7a9e, #123350);
            border: 2px solid #00D2FF33;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b8e4ff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        .friend-avatar:hover {
            transform: scale(1.15);
            border-color: #00D2FF;
        }
        .friend-avatar .online-dot {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #42f581;
            border: 2px solid #0B1E3A;
            box-shadow: 0 0 12px rgba(66, 245, 129, 0.5);
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* ----- ПОГОДА В КОЙНАХ ----- */
        .weather-widget {
            position: absolute;
            top: 70px;
            right: 30px;
            z-index: 25;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid rgba(0, 210, 255, 0.06);
            color: #b0d4f0;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .weather-widget i {
            color: #FFD700;
        }

        /* ----- НАВИГАЦИЯ МЕЖДУ ПЛАНЕТАМИ ----- */
        .planet-nav {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            display: flex;
            gap: 12px;
        }
        .planet-nav-btn {
            padding: 10px 24px;
            border-radius: 40px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 210, 255, 0.1);
            color: #b0d4f0;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .planet-nav-btn:hover:not(:disabled) {
            background: rgba(0, 210, 255, 0.08);
            border-color: #00D2FF44;
        }
        .planet-nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* ----- МИНИ-ИГРА ----- */
        .minigame-btn {
            position: absolute;
            bottom: 80px;
            right: 30px;
            z-index: 30;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 10px 18px;
            border-radius: 40px;
            border: 1px solid rgba(0, 210, 255, 0.1);
            color: #b0d4f0;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .minigame-btn:hover {
            background: rgba(0, 210, 255, 0.08);
            border-color: #00D2FF44;
            transform: scale(1.05);
        }
        .minigame-btn i {
            font-size: 22px;
            color: #FFD700;
        }

        /* ----- ИНТЕРАКТИВНЫЕ ОБЪЕКТЫ ----- */
        .space-object {
            position: absolute;
            z-index: 8;
            font-size: 28px;
            cursor: pointer;
            transition: 0.3s;
            filter: drop-shadow(0 0 20px rgba(0, 210, 255, 0.1));
        }
        .space-object:hover {
            transform: scale(1.3) rotate(20deg);
            filter: drop-shadow(0 0 40px rgba(0, 210, 255, 0.3));
        }

        /* ============================================================
           МОДАЛЬНОЕ ОКНО МИССИИ
           ============================================================ */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: slideIn 0.3s ease-out;
        }
        .modal-overlay.hidden {
            display: none;
        }

        .modal-content {
            background: rgba(11, 30, 58, 0.92);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 32px 38px;
            max-width: 540px;
            width: 92%;
            border: 1px solid rgba(0, 210, 255, 0.1);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            max-height: 85vh;
            overflow-y: auto;
            animation: slideIn 0.3s ease-out;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            color: #FFD700;
            font-size: 22px;
            font-weight: 600;
        }
        .modal-header .close-btn {
            font-size: 28px;
            color: #b0d4f0;
            cursor: pointer;
            transition: 0.2s;
            background: none;
            border: none;
            padding: 0 8px;
        }
        .modal-header .close-btn:hover {
            color: #fff;
            transform: rotate(90deg);
        }

        .modal-stage {
            color: #b0d4f0;
            margin-bottom: 16px;
        }
        .modal-stage .stage-title {
            font-size: 18px;
            font-weight: 600;
            color: #00D2FF;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal-stage .stage-content {
            font-size: 15px;
            line-height: 1.7;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            border-left: 3px solid #00D2FF44;
            min-height: 80px;
        }

        /* ----- ПРАКТИКА ----- */
        .practice-area {
            padding: 12px 0;
        }
        .practice-question {
            font-size: 18px;
            color: #fff;
            margin-bottom: 16px;
            font-weight: 500;
        }
        .practice-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }
        .practice-option {
            padding: 12px 16px;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(0, 210, 255, 0.1);
            color: #b0d4f0;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .practice-option:hover:not(:disabled) {
            background: rgba(0, 210, 255, 0.05);
            border-color: #00D2FF44;
        }
        .practice-option.selected {
            border-color: #00D2FF;
            background: rgba(0, 210, 255, 0.1);
        }
        .practice-option.correct {
            border-color: #42f581;
            background: rgba(66, 245, 129, 0.15);
            color: #42f581;
        }
        .practice-option.wrong {
            border-color: #f54242;
            background: rgba(245, 66, 66, 0.15);

        // ============================================================
        // 2. КОНФИГУРАЦИЯ ПЛАНЕТ
        // ============================================================
        const planetConfig = {
            math: { name: 'Математика', icon: '🪐', color: '#4A90D9', size: 110, x: 20, y: 25,

        const planetList = ['math', 'history', 'russian', 'chemistry', 'physics'];

        // ============================================================
        // 3. ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================================
        function getPlanetMissions(planet) {
            return state.missions.filter(m => m.planet === planet && !m.isBonus);
        }

        function isPlanetCompleted(planet) {
            const missions = getPlanetMissions(planet);
            return missions.length > 0 && missions.every(m => m.status === 'completed');
        }

        function getPlanetStatus(planet) {
            const missions = getPlanetMissions(planet);
            if (missions.every(m => m.status === 'completed')) return 'completed';
            if (missions.some(m => m.status === 'active')) return 'active';
            return 'locked';
        }

        function getActiveMission() {
            return state.missions.find(m => m.status === 'active');
        }

        // ============================================================
        // 4. НАВИГАЦИОННЫЕ ДЕЙСТВИЯ
        // ============================================================
        function goToMap() {
            alert('🗺️ Ты уже на карте!');
        }

            alert('📚 Библиотека знаний\n\nЗдесь собраны все твои пройденные теории, видеоуроки и справочные материалы.');
        }

            alert('👥 Командные рейды\n\nСобери команду друзей и проходи сложные миссии вместе!');

        // ============================================================
        // 5. ОТРИСОВКА КАРТЫ
        // ============================================================
        function renderMap() {
            const container = document.getElementById('mapInner');
            const existingPlanets = container.querySelectorAll('.planet');
            const existingDots = container.querySelectorAll('.mission-dot');
            const existingPaths = container.querySelectorAll('.star-path');

            existingPlanets.forEach(el => el.remove());
            existingDots.forEach(el => el.remove());
            existingPaths.forEach(el => el.remove());

            // ---- ПЛАНЕТЫ ----
            const planets = [...new Set(state.missions.map(m => m.planet))];
            planets.forEach(planet => {
                if (planet === 'secret' && !state.secretIslandUnlocked) return;

                const config = planetConfig[planet];
                if (!config) return;

                const completed = isPlanetCompleted(planet);
                const status = getPlanetStatus(planet);

                const div = document.createElement('div');
                div.className = `planet ${completed ? 'completed' : ''}`;
                div.style.left = config.x + '%';
                div.style.top = config.y + '%';
                div.style.transform = 'translate(-50%, -50%)';
                div.style.width = config.size + 'px';
                div.style.height = config.size + 'px';
                div.style.background = config.bg;
                div.style.border = `2px solid ${completed ? '#FFD700' : config.color}44`;
                div.style.boxShadow = `0 10px 60px ${config.color}22, 0 0 80px ${config.color}11`;

                let ringsHTML = '';
                if (planet === 'math') {
                    ringsHTML = `
                        <div class="rings"></div>
                        <div class="rings-inner"></div>
                    `;
                }

                div.innerHTML = `
                    <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
                        <span class="planet-icon">${config.icon}</span>
                        <span class="planet-name">${config.name}</span>
                        ${completed ? '<span class="planet-status">⭐</span>' : ''}
                    </div>
                    ${ringsHTML}
                `;

                div.addEventListener('click', () => focusPlanet(planet));
                container.appendChild(div);

                // ---- ТОЧКИ МИССИЙ ----
                const planetMissions = state.missions.filter(m => m.planet === planet);
                planetMissions.forEach(mission => {
                    if (mission.isBonus) return;
                    if (mission.isSecret && !state.secretIslandUnlocked) return;

                    const dot = document.createElement('div');
                    dot.className = `mission-dot ${mission.status} ${mission.isSecret ? 'secret' : ''}`;
                    dot.style.left = mission.x + '%';
                    dot.style.top = mission.y + '%';
                    dot.dataset.id = mission.id;

                    if (mission.status === 'completed') {
                        dot.innerHTML = '✨';
                    } else if (mission.status === 'active') {
                        dot.innerHTML = '🔵';
                    } else {
                        dot.innerHTML = '🔒';
                    }

                    if (mission.isSecret && mission.status === 'active') {
                        dot.innerHTML = '🌟';
                    }

                    if (mission.status !== 'locked') {
                        dot.addEventListener('click', (e) => {
                            e.stopPropagation();
                            openMission(mission.id);
                        });
                    }

                    dot.title = mission.title;
                    container.appendChild(dot);
                });

                // ---- БОНУСНЫЙ АСТЕРОИД ----
                const bonus = state.missions.find(m => m.planet === 'bonus' && m.isBonus);
                if (bonus) {
                    const dot = document.createElement('div');
                    dot.className = 'mission-dot bonus';
                    dot.style.left = bonus.x + '%';
                    dot.style.top = bonus.y + '%';
                    dot.innerHTML = '🎁';
                    dot.title = 'Бонусный астероид';
                    dot.addEventListener('click', (e) => {
                        e.stopPropagation();
                        claimBonus();
                    });
                    container.appendChild(dot);
                }

                // ---- ЗВЁЗДНЫЕ ДОРОЖКИ ----
                const sortedMissions = planetMissions
                    .filter(m => !m.isBonus && !m.isSecret)
                    .sort((a, b) => a.x - b.x);

                for (let i = 0; i < sortedMissions.length - 1; i++) {
                    const m1 = sortedMissions[i];
                    const m2 = sortedMissions[i + 1];
                    if (!m1 || !m2) continue;

                    const path = document.createElement('div');
                    path.className = `star-path ${m1.status === 'completed' ? 'completed' : ''}`;

                    const containerRect = container.getBoundingClientRect();
                    const px1 = (m1.x / 100) * containerRect.width;
                    const py1 = (m1.y / 100) * containerRect.height;
                    const px2 = (m2.x / 100) * containerRect.width;
                    const py2 = (m2.y / 100) * containerRect.height;
                    const pLength = Math.sqrt((px2 - px1) ** 2 + (py2 - py1) ** 2);

                    path.style.left = m1.x + '%';
                    path.style.top = m1.y + '%';
                    path.style.width = pLength + 'px';
                    path.style.transform = `rotate(${Math.atan2(m2.y - m1.y, m2.x - m1.x) * 180 / Math.PI}deg)`;
                    path.style.transformOrigin = 'left center';

                    container.appendChild(path);
                }

                // ---- СЕКРЕТНАЯ ПЛАНЕТА ----
                if (state.secretIslandUnlocked) {
                    const secretMissions = state.missions.filter(m => m.planet === 'secret');
                    secretMissions.forEach(m => {
                        const dot = document.createElement('div');
                        dot.className = `mission-dot ${m.status} secret`;
                        dot.style.left = m.x + '%';
                        dot.style.top = m.y + '%';
                        dot.dataset.id = m.id;
                        dot.innerHTML = m.status === 'completed' ? '✨' : m.status === 'active' ? '🌟' : '🔒';
                        if (m.status !== 'locked') {
                            dot.addEventListener('click', (e) => {
                                e.stopPropagation();
                                openMission(m.id);
                            });
                        }
                        dot.title = m.title;
                        container.appendChild(dot);
                    });
                }
            });

            // ---- ДРУЗЬЯ ОНЛАЙН (ОБНОВЛЁННЫЕ) ----
            renderFriends();

            // ---- ОБНОВЛЕНИЕ UI ----
            document.getElementById('navCoins').textContent = state.coins;
            document.getElementById('navLevel').textContent = state.level;
            document.getElementById('streakDisplay').textContent = state.streak;
            document.getElementById('todayCoins').textContent = state.todayCoinsEarned || 0;
            document.getElementById('onlineCount').textContent = state.friendsOnline.length;
        }

        // ============================================================
        // 6. ДРУЗЬЯ ОНЛАЙН (С МОДАЛЬНЫМ ОКНОМ)
        // ============================================================
        let selectedFriend = null;

        function renderFriends() {
            const container = document.getElementById('friendsOnline');
            container.innerHTML = '<span style="color:#6a8aa0;font-size:11px;margin-right:4px;">👥</span>';
            state.friendsOnline.forEach(friend => {
                const avatar = document.createElement('div');
                avatar.className = 'friend-avatar';
                avatar.innerHTML = `
                    ${friend.emoji || '👤'}
                    <span class="online-dot"></span>
                `;
                avatar.title = friend.name + ' онлайн';
                avatar.onclick = () => openFriendModal(friend);
                container.appendChild(avatar);
            });
        }

        function openFriendModal(friend) {
            selectedFriend = friend;
            document.getElementById('friendModal').classList.remove('hidden');
            document.getElementById('friendAvatar').textContent = friend.emoji || '👤';
            document.getElementById('friendName').textContent = friend.name;
        }

        function closeFriendModal() {
            document.getElementById('friendModal').classList.add('hidden');
            selectedFriend = null;
        }

        function inviteFriend() {
            if (selectedFriend) {
                alert(`🎮 Приглашение отправлено!\n\nТы позвал ${selectedFriend.name} в командный рейд! 🚀\n\nКогда он присоединится, начнётся миссия!`);
                closeFriendModal();
                showFireworks();
            }
        }

        // ============================================================
        // 7. ЗВЁЗДЫ
        // ============================================================
        function createStars() {
            const container = document.getElementById('starsBg');
            for (let i = 0; i < 120; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                container.appendChild(star);
            }
        }

        // ============================================================
        // 8. НАВИГАЦИЯ МЕЖДУ ПЛАНЕТАМИ
        // ============================================================
        let currentPlanetIndex = 0;

        function focusPlanet(planet) {
            const index = planetList.indexOf(planet);
            if (index === -1) return;
            currentPlanetIndex = index;
            updatePlanetView();
        }

        function navigatePlanet(direction) {
            const newIndex = currentPlanetIndex + direction;
            if (newIndex < 0 || newIndex >= planetList.length) return;
            currentPlanetIndex = newIndex;
            updatePlanetView();
        }

        function updatePlanetView() {
            const planet = planetList[currentPlanetIndex];
            const config = planetConfig[planet];
            if (!config) return;

            const inner = document.getElementById('mapInner');
            const targetX = 50 - config.x;
            const targetY = 50 - config.y;
            inner.style.transform = `translate(${targetX * 0.3}%, ${targetY * 0.3}%) scale(0.9)`;

            document.getElementById('prevPlanetBtn').disabled = currentPlanetIndex === 0;
            document.getElementById('nextPlanetBtn').disabled = currentPlanetIndex === planetList.length - 1;

            document.getElementById('currentPlanetName').textContent = config.name;

            const banner = document.getElementById('eventBanner');
            if (banner) {
                banner.innerHTML = `
                    <span><i class="fas fa-globe"></i> ${config.icon} ${config.name}</span>
                    <span style="color:#b0d4f0;font-size:13px;">
                        ${isPlanetCompleted(planet) ? '⭐ Завершена!' : getPlanetMissions(planet).filter(m => m.status === 'active').length > 0 ? '🔵 Есть активная миссия' : '🔒 Ещё не открыта'}
                    </span>
                `;
            }
        }

        // ============================================================
        // 9. МОДАЛЬНОЕ ОКНО МИССИИ
        // ============================================================
        let currentMission = null;
        let currentStage = 0;
        let practiceAnswered = false;
        let practiceCorrect = false;
        let hintUsed = false;

        function openMission(missionId) {
            const mission = state.missions.find(m => m.id === missionId);
            if (!mission || mission.status === 'locked') return;

            if (mission.isBonus) {
                claimBonus();
                return;
            }

            currentMission = mission;
            currentStage = 0;
            practiceAnswered = false;
            practiceCorrect = false;
            hintUsed = false;

            const modal = document.getElementById('missionModal');
            modal.classList.remove('hidden');
            document.getElementById('missionTitle').textContent = `🚀 ${mission.title}`;
            updateMissionStage();
        }

        function updateMissionStage() {
            const mission = currentMission;
            if (!mission) return;

            const stages = [
                { title: '📖 Вступление', content: mission.desc || 'Добро пожаловать в миссию!' },
                { title: '📚 Теория', content: mission.theory || 'Здесь будет теория.' },
                { title: '🎮 Практика', content: '' },
            ];

            const stage = stages[currentStage] || stages[0];
            document.getElementById('stageTitle').textContent = stage.title;

            if (currentStage === 2) {
                document.getElementById('stageContent').innerHTML = renderPractice();
            } else {
                document.getElementById('stageContent').textContent = stage.content;
            }

            renderModalButtons();
        }

        function renderPractice() {
            const mission = currentMission;
            if (!mission) return '';

            let html = `
                <div class="practice-area">
                    <div class="practice-question">${mission.task || 'Реши задание!'}</div>
                    <div class="practice-options">
            `;

            if (mission.options && mission.options.length > 0) {
                mission.options.forEach(opt => {
                    const disabled = practiceAnswered ? 'disabled' : '';
                    const selected = practiceAnswered && opt === mission.answer ? 'correct' : '';
                    const wrong = practiceAnswered && opt !== mission.answer && practiceCorrect === false ?
                        'wrong' : '';
                    html += `
                        <button class="practice-option ${selected} ${wrong}"
                                onclick="checkPracticeAnswer('${opt}')"
                                ${disabled}>
                            ${opt}
                        </button>
                    `;
                });
            } else {
                html += `<div class="text-center text-white" style="padding:20px;">Введи ответ в следующем шаге</div>`;
            }

            html += `
                    </div>
                    <div id="practiceFeedback"></div>
                </div>
            `;

            return html;
        }

        function checkPracticeAnswer(answer) {
            const mission = currentMission;
            if (!mission || practiceAnswered) return;

            const feedback = document.getElementById('practiceFeedback');

            if (answer === mission.answer) {
                practiceCorrect = true;
                practiceAnswered = true;
                feedback.innerHTML =
                    `<div class="practice-feedback success">✅ Правильно! Отлично!</div>`;
                document.querySelectorAll('.practice-option').forEach(el => {
                    el.disabled = true;
                    if (el.textContent.trim() === mission.answer) {
                        el.classList.add('correct');
                    }
                });
                if (navigator.vibrate) navigator.vibrate(100);
                showFireworks();
            } else {
                feedback.innerHTML = `
                    <div class="practice-feedback error">❌ Неправильно. Попробуй ещё!</div>
                    <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">
                        <button class="modal-btn secondary" onclick="resetPractice()">🔄 Попробовать ещё</button>
                        ${!hintUsed ? `<button class="modal-btn hint-btn" onclick="showHint()">💡 Подсказка</button>` : ''}
                    </div>
                `;
                document.querySelectorAll('.practice-option').forEach(el => {
                    if (el.textContent.trim() === answer) {
                        el.classList.add('wrong');
                    }
                });
                if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
            }

            renderModalButtons();
        }

        function resetPractice() {
            practiceAnswered = false;
            practiceCorrect = false;
            document.getElementById('practiceFeedback').innerHTML = '';
            document.querySelectorAll('.practice-option').forEach(el => {
                el.disabled = false;
                el.classList.remove('correct', 'wrong');
            });
            renderModalButtons();
        }

        function showHint() {
            hintUsed = true;
            const mission = currentMission;
            if (!mission) return;

            const hints = {
                '7': 'Подумай: 3 + 4 = ?',
                '5': 'Подумай: 8 - 3 = ?',
                '12': 'Подумай: 4 × 3 = ?',
                '33': 'В русском алфавите 33 буквы',
                '4': 'Слово МАМА состоит из 4 букв',
                'Египет': 'Где строили пирамиды?',
                'Рыцари': 'Кто защищал королевства?',
                'Колумб': 'Кто открыл Америку?',
                'Водород и кислород': 'Из чего состоит вода?',
                'Ржавеет': 'Что происходит с железом?',
                'Солнца': 'Вокруг чего движутся планеты?',
                'Гравитация': 'Что притягивает предметы к Земле?',
                '56': '7 × 8 = ?',
            };

            const hint = hints[mission.answer] || 'Подумай ещё раз, ты сможешь!';
            document.getElementById('practiceFeedback').innerHTML =
                `<div class="practice-feedback hint">💡 Подсказка: ${hint}</div>`;
            renderModalButtons();
        }

        function completeMissionSuccess() {
            const mission = currentMission;
            if (!mission) return;

            const reward = mission.isSecret ? 30 : 10;
            state.coins += reward;
            state.experience += 15;

            if (mission.isSecret) {
                state.secretMissionsCompleted += 1;
            }

            mission.status = 'completed';

            const planetMissions = state.missions.filter(m => m.planet === mission.planet && !m.isBonus && !m.isSecret);
            const allCompleted = planetMissions.every(m => m.status === 'completed');
            if (allCompleted && planetMissions.length > 0) {
                state.zoneCompleted[mission.planet] = true;
                state.coins += 20;
                state.experience += 30;
                showFireworks();
                setTimeout(() => showFireworks(), 500);
            }

            const sorted = planetMissions.filter(m => m.status === 'locked').sort((a, b) => a.x - b.x);
            if (sorted.length > 0) {
                sorted[0].status = 'active';
            }

            const completedCount = state.missions.filter(m => m.status === 'completed' && !m.isSecret && !m.isBonus)
                .length;
            if (completedCount >= 5 && !state.secretIslandUnlocked) {
                state.secretIslandUnlocked = true;
                const secret = state.missions.find(m => m.isSecret);
                if (secret) secret.status = 'active';
                setTimeout(() => alert('🌟 Секретная планета открыта!'), 300);
            }

            if (state.experience >= state.nextLevel) {
                state.level += 1;
                state.experience -= state.nextLevel;
                state.nextLevel = Math.floor(state.nextLevel * 1.5);
                setTimeout(() => alert(`🎉 Поздравляем! Ты достиг ${state.level} уровня!`), 300);
            }

            renderMap();
            closeMissionModal();
            setTimeout(() => { showFireworks();
                showFireworks(); }, 200);
        }

        function renderModalButtons() {
            const container = document.getElementById('modalButtons');
            const mission = currentMission;
            if (!mission) return;

            let buttons = [];

            if (currentStage === 0) {
                buttons.push(
                    `<button class="modal-btn secondary" onclick="closeMissionModal()">❌ Закрыть</button>`,
                    `<button class="modal-btn primary" onclick="nextStage()">Далее →</button>`
                );
            } else if (currentStage === 1) {
                buttons.push(
                    `<button class="modal-btn secondary" onclick="prevStage()">← Назад</button>`,
                    `<button class="modal-btn secondary" onclick="showFullTheory()">📖 Читать подробнее</button>`,
                    mission.video ? `<button class="modal-btn primary" onclick="watchVideo()">🎬 Смотреть видео</button>` :
                    '',
                    `<button class="modal-btn primary" onclick="nextStage()">Далее →</button>`
                );
            } else if (currentStage === 2) {
                if (practiceCorrect && practiceAnswered) {
                    buttons.push(
                        `<button class="modal-btn gold" onclick="completeMissionSuccess()">🏆 Завершить</button>`,
                        `<button class="modal-btn secondary" onclick="prevStage()">← Назад</button>`
                    );
                } else {
                    buttons.push(
                        `<button class="modal-btn secondary" onclick="prevStage()">← Назад</button>`,
                        `<button class="modal-btn primary" onclick="checkPracticeAnswer(document.querySelector('.practice-option.selected')?.textContent)">✅ Проверить</button>`
                    );
                }
            }

            container.innerHTML = buttons.filter(b => b).join('');
        }

        function nextStage() {
            if (currentStage < 2) {
                currentStage++;
                updateMissionStage();
                const content = document.getElementById('stageContent');
                content.style.animation = 'none';
                setTimeout(() => content.style.animation = 'slideIn 0.3s ease-out', 10);
            }
        }

        function prevStage() {
            if (currentStage > 0) {
                currentStage--;
                updateMissionStage();
            }
        }

        function showFullTheory() {
            const mission = currentMission;
            if (!mission) return;
            alert(`📖 Полная теория:\n\n${mission.theory || 'Здесь будет подробная теория.'}`);
        }

        function watchVideo() {
            alert('🎬 Открывается видеоурок... (в реальном проекте здесь будет видео)');
        }

        function closeMissionModal() {
            document.getElementById('missionModal').classList.add('hidden');
            currentMission = null;
            currentStage = 0;
            practiceAnswered = false;
            practiceCorrect = false;
            hintUsed = false;
        }

        // ============================================================
        // 10. БОНУСНЫЙ АСТЕРОИД
        // ============================================================
        function claimBonus() {
            if (state.dailyBonus) {
                alert('🎁 Ты уже забрал сегодняшний бонус! Завтра приходи снова :)');
                return;
            }
            state.coins += 10;
            state.dailyBonus = true;
            state.lastDailyBonusDate = new Date().toDateString();
            state.todayCoinsEarned = (state.todayCoinsEarned || 0) + 10;
            alert('🎁 Ты получил 10 атом-койнов с бонусного астероида!');
            renderMap();
        }

        // ============================================================
        // 11. ФЕЙЕРВЕРК
        // ============================================================
        function showFireworks() {
            const emojis = ['🎆', '🎇', '✨', '🌟', '⭐', '💫', '🎉'];
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'firework';
                    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    el.style.left = (Math.random() * 80 + 10) + '%';
                    el.style.top = (Math.random() * 60 + 10) + '%';
                    el.style.fontSize = (Math.random() * 30 + 20) + 'px';
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 1200);
                }, i * 60);
            }
            if (navigator.vibrate) navigator.vibrate([50, 50, 50, 50, 100]);
        }

        // ============================================================
        // 12. МИНИ-ИГРА
        // ============================================================
        let minigameScore = 0;
        let minigameInterval = null;

        function openMinigame() {
            document.getElementById('minigameOverlay').classList.remove('hidden');
            minigameScore = 0;
            document.getElementById('minigameScore').textContent = '🎯 0';
            spawnTarget();
            minigameInterval = setInterval(spawnTarget, 1000);
        }

        function closeMinigame() {
            document.getElementById('minigameOverlay').classList.add('hidden');
            if (minigameInterval) clearInterval(minigameInterval);
            if (minigameScore > 0) {
                const bonus = Math.min(minigameScore, 5);
                state.coins += bonus;
                state.todayCoinsEarned = (state.todayCoinsEarned || 0) + bonus;
                renderMap();
                alert(`🎮 Ты поймал ${minigameScore} атомов и получил ${bonus} 🪙!`);
            }
        }

        function spawnTarget() {
            const area = document.getElementById('minigameArea');
            const existing = area.querySelectorAll('.minigame-target');
            existing.forEach(el => el.remove());

            const target = document.createElement('div');
            target.className = 'minigame-target';
            const x = Math.random() * 80 + 10;
            const y = Math.random() * 70 + 15;
            target.style.left = x + '%';
            target.style.top = y + '%';
            target.textContent = '⚛️';

            target.addEventListener('click', () => {
                minigameScore++;
                document.getElementById('minigameScore').textContent = `🎯 ${minigameScore}`;
                target.remove();
                if (navigator.vibrate) navigator.vibrate(30);
                setTimeout(spawnTarget, 150);
            });

            area.appendChild(target);

            setTimeout(() => {
                if (target.parentElement) target.remove();
            }, 2000);
        }

        // ============================================================
        // 13. ИНТЕРАКТИВНЫЕ ОБЪЕКТЫ
        // ============================================================
        function interactObject(type) {
            const messages = {
                tree: ['🌳 "Ты супер!"', '🌳 "У тебя всё получится!"', '🌳 "Верь в себя!"'],
                crater: ['⚛️ Атом — это основа всего!', '⚛️ Энергия внутри каждого атома!'],
                ufo: ['🛸 Ууууу! *оставляет подарок* +1 🪙'],
            };
            const msgs = messages[type] || ['👋 Привет!'];
            const msg = msgs[Math.floor(Math.random() * msgs.length)];

            if (type === 'ufo') {
                state.coins += 1;
                state.todayCoinsEarned = (state.todayCoinsEarned || 0) + 1;
                renderMap();
                alert(msg);
            } else {
                alert(msg);
            }
            if (navigator.vibrate) navigator.vibrate(50);
        }

        // ============================================================
        // 14. ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        createStars();
        renderMap();

        setTimeout(() => {
            focusPlanet('math');
        }, 500);

        function updateEventTimer() {
            const timer = document.getElementById('eventTimer');
            const end = new Date('2026-07-10');
            const now = new Date();
            const diff = end - now;
            if (diff <= 0) {
                timer.textContent = 'Завершено';
                return;
            }
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            timer.textContent = `${days}д ${hours}ч`;
        }
        updateEventTimer();
        setInterval(updateEventTimer, 60000);

        // Клик по пустому месту
        document.getElementById('mapWrapper').addEventListener('click', (e) => {
            if (e.target.closest('.planet') || e.target.closest('.mission-dot') || e.target.closest(
                    '.space-object')) return;
            const objects = ['🌠', '☄️', '💫', '🌟'];
            const el = document.createElement('div');
            el.className = 'space-object';
            el.textContent = objects[Math.floor(Math.random() * objects.length)];
            el.style.left = (e.clientX / window.innerWidth * 90 + 5) + '%';
            el.style.top = (e.clientY / window.innerHeight * 90 + 5) + '%';
            el.style.fontSize = '20px';
            el.style.pointerEvents = 'none';
            el.style.animation = 'warpSpeed 0.8s ease-out forwards';
            document.getElementById('mapInner').appendChild(el);
            setTimeout(() => el.remove(), 800);
        });

        console.log('🚀 Космический путь загружен!');
        console.log('📊 Данные:', state);
        console.log('🌍 Планеты:', planetList);
        console.log('👥 Друзей онлайн:', state.friendsOnline.length);
    </script>

</body>
